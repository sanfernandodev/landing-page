<!DOCTYPE html>
<html lang="es">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Luis Fernando Alvarez - Desarrollo web, aplicaciones móviles, invitaciones digitales y soporte técnico en Honduras. Transformo ideas en experiencias digitales.">
  <meta name="keywords" content="desarrollo web, apps móviles, flutter, honduras, invitaciones digitales, soporte técnico, diseño web">
  <meta name="author" content="Luis Fernando Alvarez Canales">
  <meta name="google-site-verification" content="rQzku5_G-4VTcG_nNCAhtPXoMNpb2-RsAbqb9Z8NePE" />
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Luis Fernando Alvarez | Servicios Digitales">
  <meta property="og:description" content="Desarrollo web, aplicaciones móviles y soporte técnico en Honduras">
  <meta property="og:image" content="icons/Icon-512.png">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Luis Fernando Alvarez | Servicios Digitales">
  <meta name="twitter:description" content="Desarrollo web, aplicaciones móviles y soporte técnico en Honduras">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FA Digital">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme color -->
  <meta name="theme-color" content="#0D1B2A">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Luis Fernando Alvarez | Servicios Digitales - Honduras</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    body {
      background-color: #0D1B2A;
      margin: 0;
      padding: 0;
    }
    
    /* Loading screen */
    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0D1B2A 0%, #1B263B 50%, #0D1B2A 100%);
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    .loading-logo {
      font-size: 72px;
      font-weight: bold;
      color: #4ECDC4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(78, 205, 196, 0.2);
      border-top-color: #4ECDC4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      color: rgba(255, 255, 255, 0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      margin-top: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    
    .loading-hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Loading screen while Flutter loads -->
  <div id="loading" class="loading-container">
    <div class="loading-logo">FA</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando...</div>
  </div>
  
  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loader = document.getElementById('loading');
      loader.classList.add('loading-hidden');
      setTimeout(() => loader.remove(), 500);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
